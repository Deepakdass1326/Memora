<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-mark">◈</span>
        <span class="logo-name">memora</span>
      </div>
      <div id="auth-status" class="user-badge"></div>
    </header>

    <!-- ── NOT LOGGED IN ─────────────────────────────── -->
    <div id="not-logged-in" class="view hidden">
      <div class="lock-wrap">
        <div class="lock-icon">🔐</div>
        <p class="lock-title">Not connected</p>
        <p class="lock-sub">Log into Memora first, then come back.</p>
      </div>
      <a href="http://localhost:5173" target="_blank" class="btn-primary">
        Open Memora ↗
      </a>
    </div>

    <!-- ── SAVE VIEW ──────────────────────────────────── -->
    <div id="save-view" class="view hidden">

      <!-- Page preview card -->
      <div class="preview-card">
        <div class="preview-fav" id="preview-favicon"></div>
        <div class="preview-meta">
          <p class="preview-title" id="preview-title">Loading…</p>
          <p class="preview-url" id="preview-url"></p>
        </div>
      </div>

      <!-- Price banner (shopping sites only) -->
      <div id="price-preview" class="price-banner hidden">
        <span class="price-banner__icon">💰</span>
        <span class="price-banner__label">Detected price</span>
        <span id="price-display" class="price-banner__value"></span>
      </div>

      <!-- Type selector -->
      <div class="section-label">Save as</div>
      <div class="type-grid">
        <button class="type-chip active" data-type="article">
          <span class="type-chip__icon">📄</span>
          <span>Article</span>
        </button>
        <button class="type-chip" data-type="video">
          <span class="type-chip__icon">▶️</span>
          <span>Video</span>
        </button>
        <button class="type-chip" data-type="tweet">
          <span class="type-chip__icon">𝕏</span>
          <span>Tweet</span>
        </button>
        <button class="type-chip" data-type="image">
          <span class="type-chip__icon">🖼️</span>
          <span>Image</span>
        </button>
        <button class="type-chip" data-type="link">
          <span class="type-chip__icon">🔗</span>
          <span>Link</span>
        </button>
        <button class="type-chip" data-type="product">
          <span class="type-chip__icon">🛒</span>
          <span>Wishlist</span>
        </button>
      </div>

      <!-- Note -->
      <div class="field">
        <label class="field__label" for="note-input">Note</label>
        <textarea id="note-input" class="field__textarea" placeholder="What do you want to remember?"></textarea>
      </div>

      <!-- Tags -->
      <div class="field">
        <label class="field__label" for="tags-input">Tags</label>
        <input id="tags-input" class="field__input" type="text" placeholder="design, ai, tools" />
      </div>

      <!-- Save -->
      <button id="save-btn" class="btn-primary">
        <span id="save-btn-text">✦ Save to Memora</span>
      </button>
    </div>

    <!-- ── SUCCESS VIEW ───────────────────────────────── -->
    <div id="success-view" class="view hidden">
      <div class="success-wrap">
        <div class="success-ring">
          <span class="success-check">✓</span>
        </div>
        <p class="success-title">Saved!</p>
        <p class="success-sub">AI is tagging your item in the background.</p>
        <a href="http://localhost:5173" target="_blank" class="btn-ghost">
          View in Memora ↗
        </a>
      </div>
    </div>

    <!-- Error toast -->
    <div id="error-toast" class="toast hidden"></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
